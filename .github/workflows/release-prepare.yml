name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/verify-release-tag.mjs "${GITHUB_REF_NAME}"
      - run: pnpm check
      - run: pnpm test
      - run: pnpm audit --audit-level high
      - run: pnpm build
      - run: node scripts/validate-release.mjs
      - run: node scripts/prepare-release.mjs
      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ github.sha }}
          path: |
            artifacts/npm/*.tgz
            artifacts/homebrew/*.rb
          if-no-files-found: error
          retention-days: 14

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts-${{ github.sha }}
          path: artifacts
      - name: Verify release tag
        run: node scripts/verify-release-tag.mjs "${GITHUB_REF_NAME}"
      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.16.0
      - name: Publish package with npm trusted publishing
        run: npm publish artifacts/npm/*.tgz --provenance --access public
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" artifacts/npm/*.tgz artifacts/homebrew/*.rb --generate-notes --verify-tag
