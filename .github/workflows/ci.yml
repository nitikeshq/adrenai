name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm audit --audit-level high
      - run: pnpm secret-scan
      - run: pnpm build
      - run: node scripts/validate-release.mjs
      - run: node dist/main.js packs
      - run: node dist/main.js inspect examples/fixtures/typescript-codex --json
      - run: node scripts/smoke-test.mjs
      - run: node scripts/performance-test.mjs
