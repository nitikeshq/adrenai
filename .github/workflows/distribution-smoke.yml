name: Distribution Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to verify
        required: false
        default: latest
  release:
    types: [published]

permissions:
  contents: read

jobs:
  npm:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify global npm installation
        working-directory: ${{ runner.temp }}
        run: |
          npm install --global adrenai@${{ github.event.release.tag_name || inputs.version || 'latest' }}
          adrenai --version
          adrenai --help
      - name: Verify npx execution
        working-directory: ${{ runner.temp }}
        run: npx --yes adrenai@${{ github.event.release.tag_name || inputs.version || 'latest' }} --version

  homebrew:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Install from public tap
        run: brew install nitikeshq/tap/adrenai
      - name: Verify Homebrew installation
        working-directory: ${{ runner.temp }}
        run: |
          adrenai --version
          adrenai --help
          brew test nitikeshq/tap/adrenai
